<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная страница</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #fff8e8 0%, #eef6ff 100%);
      --card-bg: rgba(255, 255, 255, 0.92);
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #c46a1a;
      --accent-dark: #9f5314;
      --button-text: #ffffff;
      --shadow: 0 18px 40px rgba(34, 54, 84, 0.14);
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      padding: 32px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 640px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .grade-button {
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: var(--button-text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 10px 22px rgba(196, 106, 26, 0.28);
    }

    .grade-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(196, 106, 26, 0.36);
    }

    .grade-button:active {
      transform: translateY(0);
    }

    .grade-button:disabled {
      cursor: wait;
      opacity: 0.75;
    }

    .status {
      min-height: 24px;
      margin-top: 18px;
      color: var(--accent-dark);
      font-weight: 600;
    }

    .links {
      margin-top: 22px;
    }

    .links a {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Добро пожаловать</h1>
    <p>Страница открыта. Посещение автоматически зафиксировано.</p>
    <div class="buttons">
      <button class="grade-button" data-grade="6 класс">6 класс</button>
      <button class="grade-button" data-grade="7 класс">7 класс</button>
      <button class="grade-button" data-grade="8 класс">8 класс</button>
      <button class="grade-button" data-grade="9 класс">9 класс</button>
      <button class="grade-button" data-grade="10 класс">10 класс</button>
      <button class="grade-button" data-grade="11 класс">11 класс</button>
    </div>
    <div class="status" id="status"></div>
    <div class="links">
      <a href="/grade-clicks/view">Открыть статистику по классам</a>
    </div>
  </div>

  <script>
    const statusNode = document.getElementById("status");
    const gradeButtons = document.querySelectorAll(".grade-button");

    async function registerVisit() {
      try {
        await fetch("/visit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        });
      } catch (error) {
        console.error("Ошибка при отправке посещения:", error);
      }
    }

    async function registerGradeClick(gradeName, button) {
      button.disabled = true;
      statusNode.textContent = `Сохраняю выбор: ${gradeName}...`;

      try {
        const response = await fetch(`/grade-clicks/${encodeURIComponent(gradeName)}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        statusNode.textContent = `Выбор "${gradeName}" сохранен. Перехожу на страницу...`;
        window.location.href = `/class-pages/${encodeURIComponent(gradeName)}`;
      } catch (error) {
        console.error("Ошибка при сохранении выбора:", error);
        statusNode.textContent = `Не удалось сохранить выбор "${gradeName}".`;
      } finally {
        button.disabled = false;
      }
    }

    gradeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        registerGradeClick(button.dataset.grade, button);
      });
    });

    registerVisit();
  </script>
</body>
</html>
