name: Build to GHCR

run-name: "Build and push image for ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run tests
      run: |
        echo "Тесты пока отключены. Возвращаем успешный статус."

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN || github.token }}

    - name: Build and push image
      run: |
        IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
        docker build -t "$IMAGE:latest" ./app
        docker push "$IMAGE:latest"
